    <style>

@keyframes fadeSlide {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}

.main-content {
    animation: fadeSlide .5s ease;
}

.dash-card {
    animation: fadeSlide .6s ease;
    animation-fill-mode: both;
    transition: all .25s ease;
}

.dash-card:nth-child(1) { animation-delay: .05s; }
.dash-card:nth-child(2) { animation-delay: .10s; }
.dash-card:nth-child(3) { animation-delay: .15s; }
.dash-card:nth-child(4) { animation-delay: .20s; }


.sidebar-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    display: block;
    margin: 0 auto 6px;
}

.avatar-fallback {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1e293b;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
    margin: 0 auto 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
}

.sidebar-username {
    font-size: 13px;
    font-weight: 600;
    opacity: .9;
    margin-top: 4px;
    text-align: center;
}


.sidebar-menu i {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    vertical-align: middle;
}

.welcome-title {
    display: flex;
    align-items: center;
    gap: 8px;
}
    </style>

</head>
